<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Collection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/waste_collection.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
</head>
<body>
    <div class="container">
        <h1>Submit Waste Collection</h1>
        <form action="/waste_collection" method="POST">
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" required>
            
            <label for="waste_type">Waste Type:</label>
            <select id="waste_type" name="waste_type" required>
                <option value="plastic">Plastic</option>
                <option value="organic">Organic</option>
                <option value="metal">Metal</option>
                <option value="glass">Glass</option>
            </select>

            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" name="weight" step="0.01" required>
            
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
